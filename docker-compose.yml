services:
  pandora-app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pandora-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    environment:
      - DB_HOST=${DB_HOST:-pandora-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-pandora}
      - DB_USERNAME=${DB_USERNAME:-pandora}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-pandora-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      pandora-db:
        condition: service_healthy
      pandora-redis:
        condition: service_healthy
    networks:
      - pandora-network

  pandora-queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pandora-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./src:/var/www
    environment:
      - DB_HOST=${DB_HOST:-pandora-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-pandora}
      - DB_USERNAME=${DB_USERNAME:-pandora}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=${REDIS_HOST:-pandora-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      - pandora-app
    networks:
      - pandora-network

  pandora-nginx:
    image: nginx:1.26-alpine
    container_name: pandora-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./src/public:/var/www/public:ro
    depends_on:
      - pandora-app
      - pandora-analytics
    networks:
      - pandora-network

  pandora-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: pandora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pandora}
      POSTGRES_USER: ${DB_USERNAME:-pandora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pandora-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pandora} -d ${DB_DATABASE:-pandora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pandora-network

  pandora-redis:
    image: redis:7-alpine
    container_name: pandora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pandora-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pandora-network

  pandora-analytics:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: pandora-analytics
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./analytics:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME:-pandora}:${DB_PASSWORD:-secret}@${DB_HOST:-pandora-db}:${DB_PORT:-5432}/${DB_DATABASE:-pandora}
      - REDIS_URL=redis://${REDIS_HOST:-pandora-redis}:${REDIS_PORT:-6379}/1
    depends_on:
      pandora-db:
        condition: service_healthy
    networks:
      - pandora-network

volumes:
  pandora-db-data:
  pandora-redis-data:

networks:
  pandora-network:
    driver: bridge
