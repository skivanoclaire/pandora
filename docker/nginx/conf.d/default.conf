# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name pandora.kaltaraprov.go.id;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    http2 on;
    server_name pandora.kaltaraprov.go.id;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/pandora.kaltaraprov.go.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pandora.kaltaraprov.go.id/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /var/www/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass pandora-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Analytics API (proxy to FastAPI)
    location /api/analytics/ {
        proxy_pass http://pandora-analytics:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/pandora-access.log;
    error_log  /var/log/nginx/pandora-error.log;
}
