server {
    listen 80;
    server_name pandora.kaltaraprov.go.id 103.156.110.117 localhost;

    root /var/www/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass pandora-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    # Analytics API (proxy to FastAPI)
    location /api/analytics/ {
        proxy_pass http://pandora-analytics:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/pandora-access.log;
    error_log  /var/log/nginx/pandora-error.log;
}
